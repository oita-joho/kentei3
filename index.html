<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>検定3級 問題作成ツール</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">

    <!-- タイトル -->
    <div class="card hidden-print">
      <h1>検定3級 問題作成ツール（画像対応）</h1>
      <div class="small">
        CSVから問題を読み込み、大問ごとに1問ずつ出題してPDFを作成します。
      </div>
    </div>

    <!-- 操作エリア -->
    <div class="card hidden-print">
      <div class="grid">

        <div>
          <label>テストタイトル</label>
          <input id="titleInput" value="検定3級" />
        </div>

        <div>
          <label>出題数（自動）</label>
          <input id="countInput" type="number" value="10" disabled />
        </div>

        <div>
          <label>CSV読み込み</label>
          <input id="csvFileInput" type="file" accept=".csv,text/csv" />
        </div>

      </div>

      <div class="row top-buttons">
        <button id="loadBtn">GitHub上のCSVを読み込む</button>
        <button id="makeBtn" class="success">問題を作成</button>
        <button id="printQuestionsBtn" class="secondary">問題を印刷/PDF保存</button>
        <button id="printAnswersBtn" class="secondary">解答を印刷/PDF保存</button>
      </div>

      <div id="status" class="small">まだ読み込んでいません。</div>
    </div>

    <!-- 大問選択 -->
    <div class="select-buttons hidden-print">
      <button type="button" id="selectAllBtn">全選択</button>
      <button type="button" id="clearAllBtn" class="secondary">全解除</button>
      <button type="button" id="resetBtn" class="danger">初期化</button>
    </div>

    <div class="card hidden-print">
      <h2>出題する大問を選択</h2>
      <div id="titleCheckList" class="checklist-box">
        まだ読み込んでいません。
      </div>
    </div>

    <!-- プレビュー -->
    <div class="card">
      <h2 class="hidden-print">プレビュー</h2>
      <div id="paperArea" class="preview-sheet">
        <div>まだ作成していません。</div>
      </div>
    </div>

  </div>

  <!-- PDFライブラリ -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <!-- メイン処理 -->
  <script src="app.js"></script>

</body>
</html>
